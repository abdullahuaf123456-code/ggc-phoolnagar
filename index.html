function calcStudentFines(roll,progFull,monthYear,rates){
  const s=DB.students.find(x=>String(x.roll||x.roll_no).padStart(3,'0')===roll);
  if(!s)return null;

  // Attendance fines — count unique absent dates in this month
  const[mon,yr]=monthYear.split(' ');
  const monthNum={'January':1,'February':2,'March':3,'April':4,'May':5,'June':6,'July':7,'August':8,'September':9,'October':10,'November':11,'December':12}[mon]||0;
  const yearNum=parseInt(yr);

  const absentDates=new Set();
  DB.attendance.filter(a=>{
    const d=new Date(String(a.date).split('T')[0]);
    return String(a.roll_no).padStart(3,'0')===roll&&
      a.status==='absent'&&
      d.getMonth()+1===monthNum&&
      d.getFullYear()===yearNum;
  }).forEach(a=>absentDates.add(String(a.date).split('T')[0]));

  // Count absent classes (not days) for per-class fine
  const absentClasses=DB.attendance.filter(a=>{
    const d=new Date(String(a.date).split('T')[0]);
    return String(a.roll_no).padStart(3,'0')===roll&&
      a.status==='absent'&&
      d.getMonth()+1===monthNum&&
      d.getFullYear()===yearNum;
  }).length;

  const attendFine=absentClasses*rates.perClass;

  // Exam fines — absent papers in this month
  const examFines=[];
  const examRecs=DB.marks.filter(m=>
    String(m.roll_no).padStart(3,'0')===roll&&
    m.month_year===monthYear&&
    m.appeared==='no'
  );
  const monthlyAbsent=examRecs.filter(m=>m.test_type==='Monthly Test').length;
  const decAbsent=examRecs.filter(m=>m.test_type==='December Test'||m.test_type==='Send-up Exam').length;

  if(monthlyAbsent>0)examFines.push({type:'Monthly Test',count:monthlyAbsent,amount:monthlyAbsent*rates.monthlyTest});
  if(decAbsent>0)examFines.push({type:'Dec/Send-up Test',count:decAbsent,amount:decAbsent*rates.decSendup});

  // Carried forward — unpaid from previous months
  const carried=DB.fines.filter(f=>
    String(f.roll_no).padStart(3,'0')===roll&&
    f.status==='unpaid'&&
    f.month_year!==monthYear
  ).reduce((sum,f)=>sum+(parseFloat(f.amount)||0),0);

  const examTotal=examFines.reduce((s,e)=>s+e.amount,0);
  const total=attendFine+examTotal+carried;

  return{roll,name:s.name,program:progFull,absentClasses,attendFine,examFines,carried,total,s};
}

function previewFines(){
  const month=document.getElementById('fg-month').value;
  const prog=document.getElementById('fg-prog').value;
  const year=document.getElementById('fg-year').value;
  if(!month||!prog||!year){showToast('Select month, program and year','error');return;}
  const progFull=prog+' - '+year;
  const rates=getFineRates();
  const students=DB.students.filter(s=>s.program===progFull);
  if(!students.length){showToast('No students in this program','error');return;}

  const preview=students.map(s=>{
    const roll=String(s.roll||s.roll_no).padStart(3,'0');
    return calcStudentFines(roll,progFull,month,rates);
  }).filter(f=>f&&f.total>0);

  const area=document.getElementById('fines-preview');
  if(!area)return;
  if(!preview.length){area.innerHTML='<div class="alert alert-info">No fines to generate for this selection.</div>';return;}

  const totalAmt=preview.reduce((s,f)=>s+f.total,0);
  area.innerHTML=`<div class="alert alert-warning" style="margin-bottom:12px">
    Preview — ${preview.length} students with fines. Total: Rs. ${totalAmt}. Click Generate & Save to confirm.
  </div>
  <div class="table-wrap"><table>
    <tr><th>Roll</th><th>Name</th><th>Absent Classes</th><th>Class Fine</th><th>Exam Fines</th><th>Carried Fwd</th><th>Total</th></tr>
    ${preview.map(f=>`<tr>
      <td><span class="badge badge-gold">${f.roll}</span></td>
      <td><strong>${f.name}</strong></td>
      <td>${f.absentClasses}</td>
      <td>Rs. ${f.attendFine}</td>
      <td>${f.examFines.map(e=>`${e.type} (${e.count}): Rs.${e.amount}`).join('<br>')||'—'}</td>
      <td>${f.carried>0?`Rs. ${f.carried}`:'—'}</td>
      <td style="font-weight:700;color:var(--red)">Rs. ${f.total}</td>
    </tr>`).join('')}
  </table></div>`;
}

async function generateFines(){
  const month=document.getElementById('fg-month').value;
  const prog=document.getElementById('fg-prog').value;
  const year=document.getElementById('fg-year').value;
  if(!month||!prog||!year){showToast('Select month, program and year','error');return;}
  if(!confirm('Generate and save fines for '+prog+' '+year+' — '+month+'?'))return;

  const progFull=prog+' - '+year;
  const rates=getFineRates();
  const students=DB.students.filter(s=>s.program===progFull);
  const today=todayStr();
  const records=[];

  students.forEach(s=>{
    const roll=String(s.roll||s.roll_no).padStart(3,'0');
    const f=calcStudentFines(roll,progFull,month,rates);
    if(!f||f.total<=0)return;

    if(f.attendFine>0){
      records.push({roll_no:roll,name:s.name,program:progFull,year,month_year:month,
        fine_type:'attendance',description:`${f.absentClasses} absent classes × Rs.${rates.perClass}`,
        amount:f.attendFine,status:'unpaid',generated_date:today});
    }
    f.examFines.forEach(ef=>{
      records.push({roll_no:roll,name:s.name,program:progFull,year,month_year:month,
        fine_type:'exam',description:`${ef.type} — ${ef.count} subjects absent`,
        amount:ef.amount,status:'unpaid',generated_date:today});
    });
    if(f.carried>0){
      records.push({roll_no:roll,name:s.name,program:progFull,year,month_year:month,
        fine_type:'carried',description:'Carried from previous month',
        amount:f.carried,status:'unpaid',generated_date:today});
    }
  });

  if(!records.length){showToast('No fines to generate','error');return;}

  const btn=document.getElementById('gen-fines-btn');
  if(btn){btn.innerHTML='<span class="spinner"></span> Saving...';btn.disabled=true;}

  // Remove existing fines for this program+month before saving new ones
  DB.fines=DB.fines.filter(f=>!(f.program===progFull&&f.month_year===month));
  DB.fines.push(...records);

  await sheetsCall({action:'saveFines',records,program:progFull,month_year:month});

  if(btn){btn.innerHTML='⚡ Generate & Save';btn.disabled=false;}
  showToast(`✓ ${records.length} fine records saved`,'success');
  document.getElementById('fines-preview').innerHTML='';
  renderFineRegister();
}

function renderFineRegister(){
  const filterMonth=document.getElementById('fr-filter-month')?.value||'';
  const filterProg=document.getElementById('fr-filter-prog')?.value||'';
  const filterStatus=document.getElementById('fr-filter-status')?.value||'';
  const wrap=document.getElementById('fine-register-wrap');
  if(!wrap)return;

  let fines=[...DB.fines];
  if(filterMonth)fines=fines.filter(f=>f.month_year===filterMonth);
  if(filterProg)fines=fines.filter(f=>(f.program||'').includes(filterProg));
  if(filterStatus)fines=fines.filter(f=>f.status===filterStatus);

  if(!fines.length){wrap.innerHTML='<div class="alert alert-info">No fines match this filter.</div>';return;}

  // Group by student
  const studentMap={};
  fines.forEach(f=>{
    const key=String(f.roll_no).padStart(3,'0')+'|'+f.month_year;
    if(!studentMap[key])studentMap[key]={roll:String(f.roll_no).padStart(3,'0'),name:f.name,program:f.program,month:f.month_year,lines:[],total:0,status:'unpaid'};
    studentMap[key].lines.push(f);
    studentMap[key].total+=parseFloat(f.amount)||0;
    if(f.status==='paid')studentMap[key].status='paid';
  });

  const rows=Object.values(studentMap);
  const totalUnpaid=rows.filter(r=>r.status==='unpaid').reduce((s,r)=>s+r.total,0);

  wrap.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <div style="font-size:13px;color:var(--text2)">${rows.length} students &nbsp;·&nbsp; Total unpaid: <strong style="color:var(--red)">Rs. ${totalUnpaid}</strong></div>
  </div>
  <div class="table-wrap"><table>
    <tr><th>Roll</th><th>Name</th><th>Program</th><th>Month</th><th>Fine Details</th><th>Total</th><th>Status</th><th>Action</th></tr>
    ${rows.map(r=>`<tr>
      <td><span class="badge badge-gold">${r.roll}</span></td>
      <td><strong>${r.name}</strong></td>
      <td style="font-size:11px">${r.program}</td>
      <td style="font-size:12px">${r.month}</td>
      <td style="font-size:11px">${r.lines.map(l=>l.description+': Rs.'+l.amount).join('<br>')}</td>
      <td style="font-weight:700;color:var(--red)">Rs. ${r.total}</td>
      <td><span class="badge ${r.status==='paid'?'badge-green':'badge-red'}">${r.status==='paid'?'✓ Paid':'⬤ Unpaid'}</span></td>
      <td><button class="btn btn-sm btn-outline no-print" onclick="toggleFineStatus('${r.roll}','${r.month}')" style="font-size:11px">${r.status==='paid'?'Mark Unpaid':'Mark Paid'}</button></td>
    </tr>`).join('')}
  </table></div>`;
}

async function toggleFineStatus(roll,month){
  const fines=DB.fines.filter(f=>String(f.roll_no).padStart(3,'0')===roll&&f.month_year===month);
  if(!fines.length)return;
  const currentStatus=fines[0].status;
  const newStatus=currentStatus==='paid'?'unpaid':'paid';
  fines.forEach(f=>f.status=newStatus);
  await sheetsCall({action:'updateFineStatus',roll_no:roll,month_year:month,status:newStatus});
  showToast(`Marked as ${newStatus}`,'success');
  renderFineRegister();
}

function showSubjectReport(roll){
  const s=DB.students.find(x=>String(x.roll||x.roll_no).padStart(3,'0')===String(roll).padStart(3,'0'));
  if(!s)return;
  const subjs=DB.getStudentSubjects(s);
  const rows=subjs.map(subj=>{
    const recs=DB.attendance.filter(a=>
      String(a.roll_no).padStart(3,'0')===String(roll).padStart(3,'0')&&
      String(a.subject).trim()===String(subj).trim()
    );
    const total=recs.length;
    const present=recs.filter(a=>a.status==='present').length;
    const pct=total>0?Math.round(present/total*100):0;
    const status=total===0?'no-data':pct>=75?'regular':pct>=60?'irregular':pct>=40?'critical':'debarred';
    const color={'regular':'var(--green)','irregular':'var(--amber)','critical':'var(--red)','debarred':'#1a1a1a','no-data':'var(--text3)'}[status];
    const label={'regular':'Regular','irregular':'Irregular','critical':'Critical','debarred':'Debarred','no-data':'No Data'}[status];
    return`<tr>
      <td><strong>${subj}</strong></td>
      <td>${total}</td>
      <td style="color:var(--green);font-weight:700">${present}</td>
      <td style="color:var(--red);font-weight:700">${total-present}</td>
      <td>${total>0?`<div style="display:flex;align-items:center;gap:6px"><div class="progress" style="flex:1;min-width:60px"><div class="progress-bar ${pct>=75?'green':pct>=60?'amber':'red'}" style="width:${pct}%"></div></div><strong>${pct}%</strong></div>`:'—'}</td>
      <td><span style="background:${color};color:${status==='no-data'?'var(--text2)':'#fff'};padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600">${label}</span></td>
    </tr>`;
  }).join('');
  const overall=DB.getAttendanceStats(roll);
  showModal(`📊 ${s.name} — ${s.program}`,`
    <div style="background:var(--green-light);border-radius:8px;padding:12px;margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap">
      <div><div style="font-size:22px;font-weight:800;color:var(--green)">${overall.pct}%</div><div style="font-size:11px;color:var(--text2)">Overall</div></div>
      <div><div style="font-size:22px;font-weight:800;color:var(--text)">${overall.present}</div><div style="font-size:11px;color:var(--text2)">Present</div></div>
      <div><div style="font-size:22px;font-weight:800;color:var(--red)">${overall.total-overall.present}</div><div style="font-size:11px;color:var(--text2)">Absent</div></div>
      <div><div style="font-size:22px;font-weight:800;color:var(--text2)">${overall.total}</div><div style="font-size:11px;color:var(--text2)">Total Classes</div></div>
    </div>
    <div class="table-wrap"><table>
      <tr><th>Subject</th><th>Classes</th><th>Present</th><th>Absent</th><th>%</th><th>Status</th></tr>
      ${rows}
    </table></div>
  `);
}

function showModal(title,content){
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-bg" onclick="closeModalBg(event)">
      <div class="modal">
        <div class="modal-header"><span class="modal-title">${title}</span><button class="modal-close" onclick="closeModal()">×</button></div>
        ${content}
      </div>
    </div>`;
}
function closeModalBg(e){if(e.target.classList.contains('modal-bg'))closeModal();}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type||'');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);
}
function todayStr(){const n=new Date(new Date().getTime()+5*60*60*1000);return n.toISOString().split('T')[0];}
function formatDate(d){
  if(!d)return '';
  const clean=String(d).split('T')[0];
  if(!clean||clean.length<8)return '—';
  try{return new Date(clean+'T00:00:00').toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'});}
  catch(e){return clean;}
}
function formatTime(t){
  if(!t)return '—';
  const s=String(t);
  if(s.includes('1899-12-30T')){const parts=s.replace('1899-12-30T','').replace('.000Z','').split(':');if(parts.length>=2){let h=parseInt(parts[0]);const m=parts[1];const ampm=h>=12?'PM':'AM';h=h%12||12;return`${h}:${m} ${ampm}`;}}
  if(s.includes('AM')||s.includes('PM'))return s;
  if(s.includes(':')&&s.length<=5){const parts=s.split(':');let h=parseInt(parts[0]);const m=parts[1];const ampm=h>=12?'PM':'AM';h=h%12||12;return`${h}:${m} ${ampm}`;}
  return s;
}
// ── OFFLINE SYNC ──
function saveToQueue(payload){
  try{
    const q=JSON.parse(localStorage.getItem('ggc_sync_queue')||'[]');
    q.push({payload,timestamp:Date.now()});
    localStorage.setItem('ggc_sync_queue',JSON.stringify(q));
    updateSyncBadge();
  }catch(e){}
}
function getPendingCount(){
  try{return JSON.parse(localStorage.getItem('ggc_sync_queue')||'[]').length;}catch(e){return 0;}
}
function updateSyncBadge(){
  const n=getPendingCount();
  const badge=document.getElementById('sync-badge');
  if(badge){
    badge.textContent=n>0?`${n} pending sync`:'✓ All synced';
    badge.style.background=n>0?'#e65100':'#1a7a3a';
  }
  const btn=document.getElementById('manual-sync-btn');
  if(btn){btn.style.display=n>0?'inline-flex':'none';}
}
async function syncPending(){
  const q=JSON.parse(localStorage.getItem('ggc_sync_queue')||'[]');
  if(!q.length){showToast('All synced — nothing pending','success');return;}
  if(!navigator.onLine){showToast('No internet connection — try again later','error');return;}
  const btn=document.getElementById('manual-sync-btn');
  if(btn){btn.innerHTML='<span class="spinner"></span> Syncing...';btn.disabled=true;}
  const remaining=[];
  let success=0;
  for(const item of q){
    try{
      await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(item.payload),headers:{'Content-Type':'text/plain'},mode:'no-cors'});
      success++;
      // Small delay between requests to avoid overwhelming Apps Script
      await new Promise(r=>setTimeout(r,300));
    }catch(e){
      remaining.push(item);
    }
  }
  localStorage.setItem('ggc_sync_queue',JSON.stringify(remaining));
  updateSyncBadge();
  if(btn){btn.innerHTML='🔄 Sync Now';btn.disabled=false;}
  if(success>0){
    showToast(`✓ ${success} session(s) synced to Google Sheets`,'success');
    fullAttendanceLoaded=false;
    marksLoadedAt=0;
    finesLoadedAt=0;
    await refreshAttendance(true);
  }
  if(remaining.length>0){
    showToast(`⚠ ${remaining.length} session(s) still pending — try again`,'error');
  }
}
window.addEventListener('load',()=>{
  loadFromSheets();
  updateSyncBadge();
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
});

// Auto-sync when internet returns
window.addEventListener('online',()=>{
  // Clear offline warning banner
  hideSyncBar();
  const q=JSON.parse(localStorage.getItem('ggc_sync_queue')||'[]');
  if(q.length>0){
    showToast(`📶 Internet restored — syncing ${q.length} pending class(es)...`,'success');
    setTimeout(syncPending,1000);
  } else {
    showToast('📶 Internet restored','success');
  }
});

window.addEventListener('offline',()=>{
  showToast('📶 Internet lost — attendance will be saved locally','error');
});
</script>
