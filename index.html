<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGC Phoolnagar — Attendance</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a7a3a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GGC Attend">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f7f0;--surface:#ffffff;--surface2:#f4faf4;
  --border:#d1e8d1;--border2:#a8d5a8;
  --text:#1a2e1a;--text2:#4a6e4a;--text3:#8aaa8a;
  --green:#1a7a3a;--green-dark:#145e2c;--green-light:#e8f5e9;--green-mid:#a5d6a7;--green-xlight:#f1faf1;
  --gold:#c8960a;--gold-light:#fff8e1;--gold-mid:#ffe082;
  --red:#c62828;--red-light:#ffebee;--red-mid:#ffcdd2;
  --amber:#e65100;--amber-light:#fff3e0;--amber-mid:#ffcc80;
  --radius:10px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,60,0,0.08);
  --shadow-md:0 4px 12px rgba(0,60,0,0.10);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.hidden{display:none!important}
.sync-bar{background:var(--green-dark);color:#fff;text-align:center;font-size:11px;padding:4px;font-weight:500;letter-spacing:.3px;display:none}
.sync-bar.show{display:block}
.sync-bar.error{background:var(--red)}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#0d3d1a}
.login-bg-pattern{position:absolute;inset:0;opacity:.07;background-image:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);background-size:20px 20px}
.login-card{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,.35);position:relative;z-index:1}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo h1{font-size:20px;font-weight:800;color:var(--green-dark)}
.login-logo .college-full{font-size:12px;color:var(--text2);margin-top:3px;font-style:italic}
.login-logo .college-tagline{font-size:11px;color:var(--text3);margin-top:2px}
.login-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:16px 0}
.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.role-tab{padding:10px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface2);cursor:pointer;text-align:center;font-size:13px;font-weight:600;color:var(--text2);transition:all .2s}
.role-tab.active{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);background:#fff;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--green)}
.btn{padding:10px 20px;border-radius:var(--radius);border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:var(--green);color:#fff;width:100%;padding:12px}
.btn-primary:hover{background:var(--green-dark)}
.btn-primary:disabled{background:var(--text3);cursor:not-allowed}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:var(--green-dark)}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--text)}
.btn-outline:hover{background:var(--surface2)}
.btn-sm{padding:6px 12px;font-size:12px}
.login-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:12px}
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:linear-gradient(135deg,#145e2c,#1a7a3a,#1e8f42);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,60,0,.2)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-crest{width:38px;height:38px;flex-shrink:0}
.topbar-names{display:flex;flex-direction:column}
.topbar-title{font-size:15px;font-weight:800;color:#fff;line-height:1.2}
.topbar-sub{font-size:10px;color:rgba(255,255,255,.65);font-style:italic}
.topbar-role{font-size:11px;color:var(--green-dark);background:rgba(255,255,255,.92);border-radius:20px;padding:3px 10px;font-weight:700}
.topbar-user{font-size:13px;color:rgba(255,255,255,.85);font-weight:500}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:500}
.btn-logout:hover{background:rgba(255,255,255,.25)}
.nav-tabs{background:#fff;border-bottom:2px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto;box-shadow:var(--shadow)}
.nav-tab{padding:12px 16px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .2s;margin-bottom:-2px}
.nav-tab.active{color:var(--green-dark);border-bottom-color:var(--green)}
.nav-tab:hover{color:var(--green);background:var(--green-xlight)}
.content{padding:24px 20px;max-width:1100px;margin:0 auto;width:100%}
.page-header{margin-bottom:20px}
.page-header h2{font-size:20px;font-weight:800;color:var(--text)}
.page-header p{font-size:13px;color:var(--text2);margin-top:4px}
.dash-hero{background:linear-gradient(135deg,#145e2c,#1a7a3a,#1e8f42);border-radius:var(--radius-lg);padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:20px;box-shadow:var(--shadow-md);position:relative;overflow:hidden}
.dash-hero::after{content:'';position:absolute;right:-20px;top:-20px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.05)}
.dash-hero-crest{width:60px;height:60px;flex-shrink:0;opacity:.9}
.dash-hero-text h3{color:#fff;font-size:17px;font-weight:800;margin-bottom:2px}
.dash-hero-text p{color:rgba(255,255,255,.7);font-size:12px}
.dash-hero-date{margin-left:auto;text-align:right;color:rgba(255,255,255,.85);font-size:13px;font-weight:600}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.card-title{font-size:15px;font-weight:700;color:var(--text)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.sc-green::before{background:var(--green)}
.stat-card.sc-gold::before{background:var(--gold)}
.stat-card.sc-red::before{background:var(--red)}
.stat-card.sc-teal::before{background:#00695c}
.stat-card.sc-gray::before{background:var(--text3)}
.stat-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:800;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;background:#fff}
th{background:var(--green-xlight);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--green-dark);text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--green-xlight)}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-light);color:#1b5e20}
.badge-red{background:var(--red-light);color:#b71c1c}
.badge-amber{background:var(--amber-light);color:#bf360c}
.badge-gold{background:var(--gold-light);color:#7b5800}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.form-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.attend-header{background:linear-gradient(135deg,#145e2c,#1e8f42);color:#fff;border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;box-shadow:var(--shadow-md)}
.attend-header h3{font-size:18px;font-weight:800;margin-bottom:4px}
.attend-header p{font-size:13px;opacity:.8}
.scanner-area{border:2px dashed var(--green-mid);border-radius:var(--radius-lg);padding:20px;text-align:center;background:var(--green-xlight);margin-bottom:16px}
#qr-reader{width:100%;max-width:300px;margin:0 auto}
#qr-reader video{border-radius:var(--radius)!important}
.student-list{display:grid;gap:6px;max-height:400px;overflow-y:auto}
.student-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;transition:all .2s}
.student-row.present{border-color:var(--green);background:var(--green-light)}
.student-row.absent{border-color:var(--red);background:var(--red-light)}
.student-info{display:flex;align-items:center;gap:10px}
.student-avatar{width:32px;height:32px;border-radius:50%;background:var(--green-mid);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#1b5e20;flex-shrink:0}
.student-name{font-size:13px;font-weight:600;color:var(--text)}
.student-roll{font-size:11px;color:var(--text2)}
.attend-btns{display:flex;gap:6px}
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.qr-card{border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;background:#fff}
.qr-card-header{background:var(--green-dark);color:#fff;font-size:9px;font-weight:700;letter-spacing:.5px;padding:4px 8px;border-radius:4px;margin-bottom:8px}
.qr-card .qr-name{font-size:12px;font-weight:700;color:var(--text);margin-top:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qr-card .qr-roll{font-size:11px;color:var(--text2);font-weight:600}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#fff;border-radius:var(--radius-lg);padding:24px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);border-top:4px solid var(--green)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:800;color:var(--text)}
.modal-close{background:transparent;border:none;font-size:20px;cursor:pointer;color:var(--text2)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 18px;border-radius:var(--radius);font-size:13px;font-weight:600;z-index:2000;box-shadow:var(--shadow-md);transition:all .3s;transform:translateY(100px);opacity:0;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{padding:12px 16px;border-radius:var(--radius);margin-bottom:16px;font-size:13px;font-weight:500}
.alert-warning{background:var(--amber-light);color:#7c3200;border:1px solid var(--amber-mid)}
.alert-info{background:var(--green-light);color:#1b5e20;border:1px solid var(--green-mid)}
.progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;transition:width .3s}
.progress-bar.green{background:var(--green)}
.progress-bar.amber{background:var(--amber)}
.progress-bar.red{background:var(--red)}
.loading-overlay{position:fixed;inset:0;background:rgba(13,61,26,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.spin-big{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@media(max-width:600px){
  .content{padding:16px 12px}
  .form-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .dash-hero{flex-direction:column;text-align:center}
  .dash-hero-date{margin-left:0}
}
@media print{
  .topbar,.nav-tabs,.sync-bar,.no-print,.id-card-controls{display:none!important}
  .qr-grid{grid-template-columns:repeat(4,1fr)}
  .id-card-grid{grid-template-columns:repeat(2,1fr)}
  body{background:#fff;padding:0}
  .content{padding:0}
  .id-card{box-shadow:none;border:1.5px solid #000}
  .id-card-header{-webkit-print-color-adjust:exact;print-color-adjust:exact;background:linear-gradient(135deg,#145e2c,#1a7a3a)!important;color:#fff!important}
  .id-card{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .id-card-photo{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* ── ID CARDS ── */
.id-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(323px,1fr));gap:20px}
.id-card{width:323px;height:204px;position:relative;background:#fff;border:2px solid #000;border-radius:8px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.15);page-break-inside:avoid}
.id-card-header{background:linear-gradient(135deg,#145e2c,#1a7a3a);padding:7px 8px;text-align:center;color:#fff}
.id-card-header h3{font-size:11px;font-weight:800;letter-spacing:.4px;margin:0;text-transform:uppercase}
.id-card-body{display:flex;padding:10px;gap:10px;height:calc(100% - 30px)}
.id-card-photo{width:68px;height:88px;background:#f0f0f0;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:32px;border-radius:3px;overflow:hidden}
.id-card-photo img{width:100%;height:100%;object-fit:cover}
.id-card-info{flex:1;position:relative;display:flex;flex-direction:column}
.id-card-fields{font-size:10px;line-height:1.6}
.id-card-fields div{margin-bottom:2px}
.id-card-fields strong{font-weight:700;color:#1a7a3a}
.id-card-qr{position:absolute;bottom:8px;right:0;width:54px;height:54px}
.id-card-footer{position:absolute;bottom:8px;left:10px;font-size:8px;color:#888}

/* ── MARKS & PUNCTUALITY ── */
.marks-test-card{background:var(--gold-light);border:1.5px solid var(--gold-mid);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.marks-test-card.december{background:var(--green-light);border-color:var(--green-mid)}
.marks-test-card.sendup{background:var(--surface2);border-color:var(--border)}
.marks-input{width:60px;padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;text-align:center;outline:none}
.marks-input:focus{border-color:var(--green)}
.perf-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow)}
.perf-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.perf-metric{margin-bottom:10px}
.perf-metric-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.perf-metric-value{font-size:13px;font-weight:600;color:var(--text)}
.punct-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
</style>
</head>
<body>

<svg style="display:none">
  <symbol id="ggc-crest" viewBox="0 0 100 100">

<div class="loading-overlay" id="loading-overlay">
  <svg style="width:64px;height:64px" viewBox="0 0 100 100"><use href="#ggc-crest"/></svg>
  <div class="spin-big"></div>
  <p style="color:#fff;font-size:14px;font-weight:600">GGC Phoolnagar</p>
  <small id="loading-msg" style="color:rgba(255,255,255,.6);font-size:12px">Connecting to Google Sheets...</small>
</div>

<div class="sync-bar" id="sync-bar"></div>

<div id="login-screen" style="display:none">
  <div class="login-bg-pattern"></div>
  <div class="login-card">
    <div class="login-logo">
      <div style="margin-bottom:14px"><svg style="width:80px;height:80px" viewBox="0 0 100 100"><use href="#ggc-crest"/></svg></div>
      <h1>GGC Phoolnagar</h1>
      <div class="college-full">Government Graduate College, Phoolnagar</div>
      <div class="college-tagline">Attendance Management System</div>
    </div>
    <div class="login-divider"></div>
    <div class="role-tabs">
      <div class="role-tab active" onclick="setRole('admin')" id="tab-admin">🔑 Principal</div>
      <div class="role-tab" onclick="setRole('teacher')" id="tab-teacher">👨‍🏫 Teacher</div>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-user" value="principal">
    </div>
    <div class="form-group">
      <label>Password / PIN</label>
      <input type="password" id="login-pass" value="admin123">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Sign In →</button>
    <p class="login-hint" id="sheets-status">Connecting to Google Sheets...</p>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <svg class="topbar-crest" viewBox="0 0 100 100"><use href="#ggc-crest"/></svg>
      <div class="topbar-names">
        <div class="topbar-title">GGC Phoolnagar</div>
        <div class="topbar-sub">Government Graduate College</div>
      </div>
      <span class="topbar-role" id="topbar-role">Admin</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="topbar-user" id="topbar-user">Principal</span>
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div id="offline-bar" style="background:#fff;border-bottom:1px solid var(--border);padding:6px 20px;display:flex;align-items:center;gap:10px;justify-content:flex-end">
    <span id="sync-badge" style="font-size:11px;font-weight:600;color:#fff;background:#1a7a3a;padding:2px 10px;border-radius:20px">All synced</span>

const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxU6fVkAtgdfgGBPYC7c3sFYXCYdnuYSA6WGP8PyHR41ZJBLzflkZd90ZyWuy1VCGpHyQ/exec';

    if(s.subjects&&s.subjects!==''){
      try{return typeof s.subjects==='string'?s.subjects.split(',').map(x=>x.trim()):s.subjects;}

let currentUser=null,currentRole=null,loginRole='admin',scannerInstance=null,currentScanSession=null,sheetsReady=false,cameraFacing='user';

function sheetsCall(payload){
  if(!navigator.onLine){
    // Offline — save to queue immediately
    addToQueue(payload);
    showSyncBar('📶 Offline — saved locally',false,false);
    setTimeout(hideSyncBar,3000);
    return Promise.resolve({success:true,queued:true});
  }
  // Online — try direct fetch
  showSyncBar('Saving...');
  fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'text/plain'},mode:'no-cors'})
    .then(()=>{
      showSyncBar('✓ Saved to Sheets',false,true);
      setTimeout(hideSyncBar,2000);
      updateSyncBadge();
    })
    .catch(()=>{
      // Fetch failed even though online — queue as fallback
      addToQueue(payload);
      showSyncBar('⚠ Save failed — queued locally',true,false);
      setTimeout(hideSyncBar,3000);
    });
  return Promise.resolve({success:true});
}

function addToQueue(payload){
  try{
    const q=JSON.parse(localStorage.getItem('ggc_sync_queue')||'[]');
    // Avoid duplicate queue entries for same session
    const key=JSON.stringify({action:payload.action,date:payload.records?.[0]?.date,subject:payload.records?.[0]?.subject,teacher_id:payload.records?.[0]?.teacher_id});
    const exists=q.find(item=>JSON.stringify({action:item.payload.action,date:item.payload.records?.[0]?.date,subject:item.payload.records?.[0]?.subject,teacher_id:item.payload.records?.[0]?.teacher_id})===key);
    if(!exists){
      q.push({payload,timestamp:Date.now()});
      localStorage.setItem('ggc_sync_queue',JSON.stringify(q));
    }
    updateSyncBadge();
  }catch(e){}
}

// ── OFFLINE CACHE HELPERS ──
function saveToCache(data){
  try{
    localStorage.setItem('ggc_students',JSON.stringify(data.students||[]));
    localStorage.setItem('ggc_teachers',JSON.stringify(data.teachers||[]));
    localStorage.setItem('ggc_programs',JSON.stringify(data.programs||{}));
    localStorage.setItem('ggc_teacherGroups',JSON.stringify(data.teacherGroups||[]));
    localStorage.setItem('ggc_attendance',JSON.stringify(data.attendance||[]));
    localStorage.setItem('ggc_cache_time',Date.now().toString());
  }catch(e){}
}

function loadFromCache(){
  try{
    const students=JSON.parse(localStorage.getItem('ggc_students')||'[]');
    const teachers=JSON.parse(localStorage.getItem('ggc_teachers')||'[]');
    const programs=JSON.parse(localStorage.getItem('ggc_programs')||'{}');
    const teacherGroups=JSON.parse(localStorage.getItem('ggc_teacherGroups')||'[]');
    const attendance=JSON.parse(localStorage.getItem('ggc_attendance')||'[]');
    const cacheTime=parseInt(localStorage.getItem('ggc_cache_time')||'0');
    return{students,teachers,programs,teacherGroups,attendance,cacheTime};
  }catch(e){return null;}
}

function hasCachedData(){
  return !!localStorage.getItem('ggc_students')&&
    JSON.parse(localStorage.getItem('ggc_students')||'[]').length>0;
}

async function loadFromSheets(){
  try{
    document.getElementById('loading-msg').textContent='Loading college data...';
    const res=await fetch(SCRIPT_URL+'?type=startup&t='+Date.now());
    const data=await res.json();
    if(data.success){
      if(data.students&&data.students.length)DB.students=data.students.map(s=>({...s,roll:String(s.roll_no||s.roll||'').padStart(3,'0')}));
      if(data.teachers&&data.teachers.length)DB.teachers=data.teachers.map(t=>({...t,id:t.teacher_id||t.id,subjects:typeof t.subjects==='string'?t.subjects.split(',').map(x=>x.trim()):(t.subjects||[])}));
      if(data.attendance&&data.attendance.length)DB.attendance=data.attendance;
      if(data.programs&&Object.keys(data.programs).length)DB.programs=data.programs;
      if(data.teacherGroups&&data.teacherGroups.length)DB.teacherGroups=data.teacherGroups;
      // marks and fines loaded on demand — not at startup
      sheetsReady=true;
      // Save fresh data to cache for offline use
      saveToCache({
        students:DB.students,teachers:DB.teachers,
        programs:DB.programs,teacherGroups:DB.teacherGroups,
        attendance:DB.attendance
      });
      document.getElementById('sheets-status').textContent='✓ Connected to Google Sheets';
      document.getElementById('sheets-status').style.color='#1b5e20';
    }else{
      document.getElementById('sheets-status').textContent='⚠ Could not load data';
    }
  }catch(e){
    // Network failed — try loading from cache
    document.getElementById('loading-msg').textContent='Offline — loading cached data...';
    const cache=loadFromCache();
    if(cache&&cache.students.length>0){
      DB.students=cache.students.map(s=>({...s,roll:String(s.roll_no||s.roll||'').padStart(3,'0')}));
      DB.teachers=cache.teachers.map(t=>({...t,id:t.teacher_id||t.id,subjects:typeof t.subjects==='string'?t.subjects.split(',').map(x=>x.trim()):(t.subjects||[])}));
      DB.programs=cache.programs;
      DB.teacherGroups=cache.teacherGroups;
      DB.attendance=cache.attendance;
      sheetsReady=false;
      const cacheDate=cache.cacheTime?new Date(cache.cacheTime).toLocaleDateString('en-PK'):'unknown';
      document.getElementById('sheets-status').textContent='📶 Offline — using cached data from '+cacheDate;
      document.getElementById('sheets-status').style.color='#e65100';
    }else{
      // No cache available
      document.getElementById('sheets-status').textContent='⚠ No internet and no cached data. Please connect and refresh.';
      document.getElementById('sheets-status').style.color='#c62828';
    }
  }
  document.getElementById('loading-overlay').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

function getDashboardSlotData(){
  const pkt=getPKTTime();
  const nowMins=pkt.mins;
  const today=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][pkt.dayIndex];
  const todayStr2=todayStr();
  const GRACE=30;// 30 min grace before marking Not Submitted

  // Get all assignments scheduled for today where time has passed (+ grace)
  const dayAbbrs={'Monday':'Mon','Tuesday':'Tue','Wednesday':'Wed','Thursday':'Thu','Friday':'Fri','Saturday':'Sat','Sunday':'Sun'};

  const pastAssignments=DB.teacherGroups.filter(tg=>{
    if(!tg.scheduled_time||!tg.days)return false;
    const schedMins=timeToMins(tg.scheduled_time);
    if(schedMins===null)return false;
    const normDays=(tg.days||'').split(',').map(d=>{const t=d.trim();return dayAbbrs[t]||t;});
    const dayMatch=normDays.includes(today);
    return dayMatch&&schedMins<=nowMins;
  });

  // Group by scheduled time slot
  const slotMap={};
  pastAssignments.forEach(tg=>{
    const schedMins=timeToMins(tg.scheduled_time);
    const slotKey=minsToTimeStr(schedMins);
    if(!slotMap[slotKey])slotMap[slotKey]={slot:slotKey,scheduledMins:schedMins,assignments:[],submitted:[],ontime:[],late:[],notSubmitted:[]};
    slotMap[slotKey].assignments.push(tg);
  });

  // Match with today's submissions
  const todayRecs=DB.attendance.filter(a=>String(a.date||'').split('T')[0]===todayStr2);

  Object.values(slotMap).forEach(slot=>{
    slot.assignments.forEach(tg=>{
      // Find submission for this teacher+subject+year today
      const sub=todayRecs.find(a=>
        String(a.teacher_id||'')===String(tg.teacher_id)&&
        String(a.subject||'')===String(tg.subject)&&
        String(a.year||'')===String(tg.year)
      );
      const teacher=DB.teachers.find(t=>(t.id||t.teacher_id)===tg.teacher_id);
      const tName=teacher?teacher.name:tg.teacher_name||tg.teacher_id;

      if(sub){
        const subMins=timeToMins(sub.time);
        const delay=subMins!==null?subMins-slot.scheduledMins:null;
        if(delay!==null&&delay<=10){
          slot.ontime.push({name:tName,subject:tg.subject,year:tg.year,delay});
        } else {
          slot.late.push({name:tName,subject:tg.subject,year:tg.year,delay});
        }
        slot.submitted.push(tg);
      } else {
        // Only flag as not submitted after grace period
        if(nowMins-slot.scheduledMins>=GRACE){
          slot.notSubmitted.push({name:tName,subject:tg.subject,year:tg.year});
        }
      }
    });
  });

  return Object.values(slotMap).sort((a,b)=>a.scheduledMins-b.scheduledMins);
}

function showSlotDetail(slotKey,type){
  const slots=getDashboardSlotData();
  const slot=slots.find(s=>s.slot===slotKey);
  if(!slot)return;
  const items=slot[type]||[];
  const labels={ontime:'✓ On Time',late:'⚠ Late',notSubmitted:'⊘ Not Submitted'};
  const colors={ontime:'var(--green)',late:'var(--amber)',notSubmitted:'var(--red)'};
  showModal(`${labels[type]} — ${slotKey}`,
    items.length?`<div class="table-wrap"><table>
      <tr><th>Teacher</th><th>Subject</th><th>Year</th>${type!=='notSubmitted'?'<th>Delay</th>':''}</tr>
      ${items.map(i=>`<tr>
        <td><strong>${i.name}</strong></td>
        <td>${i.subject}</td>
        <td>${i.year||'—'}</td>
        ${type!=='notSubmitted'?`<td style="color:${i.delay<=0?'var(--green)':i.delay<=10?'var(--green)':'var(--amber)'}">
          ${i.delay===null?'—':i.delay<=0?Math.abs(i.delay)+'m early':'+'+i.delay+'m'}
        </td>`:''}
      </tr>`).join('')}
    </table></div>`
    :`<div class="alert alert-info">No records for this category.</div>`
  );
}

function pageDashboard(){
  const today=todayStr();
  const pkt=getPKTTime();
  const sevenDaysAgo=new Date(new Date().getTime()+5*60*60*1000-7*24*60*60*1000).toISOString().split('T')[0];
  const todayRecs=DB.attendance.filter(a=>{const d=String(a.date||'').split('T')[0];return d>=sevenDaysAgo;});
  const todayOnly=DB.attendance.filter(a=>String(a.date||'').split('T')[0]===today);

  // Stat calculations
  const presentToday=new Set(todayOnly.filter(a=>a.status==='present').map(a=>String(a.roll_no).padStart(3,'0'))).size;
  const absentToday=new Set(todayOnly.filter(a=>a.status==='absent').map(a=>String(a.roll_no).padStart(3,'0'))).size;

  // Scheduled sessions — past assignments today
  const dayAbbrs2={'Monday':'Mon','Tuesday':'Tue','Wednesday':'Wed','Thursday':'Thu','Friday':'Fri','Saturday':'Sat','Sunday':'Sun'};
  const todayDay=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][pkt.dayIndex];
  const scheduledSessions=DB.teacherGroups.filter(tg=>{
    if(!tg.scheduled_time||!tg.days)return false;
    const schedMins=timeToMins(tg.scheduled_time);
    if(schedMins===null)return false;
    const normDays=(tg.days||'').split(',').map(d=>{const t=d.trim();return dayAbbrs2[t]||t;});
    return normDays.includes(todayDay)&&schedMins<=pkt.mins;
  }).length;

  // Submitted sessions today
  const submittedSessions=new Set(todayOnly.map(a=>String(a.date).split('T')[0]+'|'+a.subject+'|'+(a.teacher_id||'')+'|'+(a.year||''))).size;

  // Time slot data
  const slotData=getDashboardSlotData();

  // Recent sessions — sort by date desc then by time desc
  const recentKeys=[...new Set(todayRecs.map(a=>String(a.date).split('T')[0]+'|'+a.subject+'|'+(a.teacher_id||'')+'|'+(a.year||'')))];
  const recentSorted=recentKeys.map(key=>{
    const[d,subj,tid,yr]=key.split('|');
    const recs=todayRecs.filter(a=>String(a.date).split('T')[0]===d&&a.subject===subj&&String(a.teacher_id||'')===tid&&(a.year||'')===(yr||''));
    const timeVal=recs[0]?.time||'';

    return{key,d,subj,tid,yr,recs,timeVal,timeMins};
  }).sort((a,b)=>{
    if(b.d!==a.d)return b.d.localeCompare(a.d);
    return b.timeMins-a.timeMins;
  });

  return`<div class="dash-hero">
    <svg class="dash-hero-crest" viewBox="0 0 100 100"><use href="#ggc-crest"/></svg>
    <div class="dash-hero-text">

      <p>Welcome, ${currentUser.name} — ${sheetsReady?'🟢 Live Google Sheets':'🟡 Offline mode'}</p>
    </div>
    <div class="dash-hero-date">${formatDate(today)}<br><span style="font-size:11px;opacity:.7">Today</span></div>
  </div>

  <div class="stats-grid">

    <div class="stat-card sc-gold"><div class="stat-label">Scheduled Sessions</div><div class="stat-value" style="color:var(--gold)">${scheduledSessions}</div><div class="stat-sub">By now</div></div>
    <div class="stat-card sc-gray"><div class="stat-label">Submitted Sessions</div><div class="stat-value">${submittedSessions}</div><div class="stat-sub">Today</div></div>
  </div>

  ${!sheetsReady?`<div class="alert alert-warning" style="margin-bottom:16px">⚠️ Not connected to Google Sheets — showing cached data.</div>`:''}

  ${slotData.length?`
  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><span class="card-title">🕐 Time Slot Analysis</span><span class="badge badge-gray">Today — Past slots only</span></div>
    <div class="table-wrap"><table>
      <tr><th>Time Slot</th><th>Scheduled</th><th>Submitted</th>
        <th style="color:var(--green)">On Time</th>
        <th style="color:var(--amber)">Late</th>
        <th style="color:var(--red)">Not Submitted</th>
        <th>Punctuality %</th><th>Note</th></tr>
      ${slotData.map(sl=>{
        const total=sl.assignments.length;
        const submitted=sl.submitted.length;
        const ontime=sl.ontime.length;
        const late=sl.late.length;
        const notSub=sl.notSubmitted.length;
        const pct=submitted>0?Math.round(ontime/submitted*100):0;
        const note=notSub>0?'⚠️ Missing':pct<60?'⚠️ High delay':pct<75?'⚠️ Needs attention':pct>=90?'✓ Excellent':'✓ Good';
        const noteCol=notSub>0||pct<60?'var(--red)':pct<75?'var(--amber)':'var(--green)';
        const rowStyle=notSub>0?'background:var(--red-light)':pct<60?'background:var(--amber-light)':'';
        return`<tr style="${rowStyle}">
          <td><strong>${sl.slot}</strong></td>
          <td>${total}</td>
          <td>${submitted}</td>
          <td>${ontime>0?`<span style="color:var(--green);font-weight:700;cursor:pointer;text-decoration:underline" onclick="showSlotDetail('${sl.slot}','ontime')">${ontime}</span>`:'<span style="color:var(--text3)">0</span>'}</td>
          <td>${late>0?`<span style="color:var(--amber);font-weight:700;cursor:pointer;text-decoration:underline" onclick="showSlotDetail('${sl.slot}','late')">${late}</span>`:'<span style="color:var(--text3)">0</span>'}</td>
          <td>${notSub>0?`<span style="color:var(--red);font-weight:700;cursor:pointer;text-decoration:underline" onclick="showSlotDetail('${sl.slot}','notSubmitted')">${notSub}</span>`:'<span style="color:var(--text3)">0</span>'}</td>
          <td><div style="display:flex;align-items:center;gap:6px"><div class="progress" style="flex:1;min-width:50px"><div class="progress-bar ${pct>=75?'green':pct>=50?'amber':'red'}" style="width:${submitted?pct:0}%"></div></div><strong>${submitted?pct+'%':'—'}</strong></div></td>
          <td style="font-size:12px;color:${noteCol}">${note}</td>
        </tr>`;
      }).join('')}
    </table></div>
  </div>`:''}

  <div class="card">
    <div class="card-header"><span class="card-title">Recent Sessions</span><span class="badge badge-gray">Last 7 Days</span></div>
    ${recentSorted.length===0?`<p style="color:var(--text2);font-size:13px;text-align:center;padding:20px 0">No attendance recorded in last 7 days.</p>`:`
    <div class="table-wrap"><table>
      <tr><th>Date</th><th>Subject</th><th>Year</th><th>Teacher</th><th>Present</th><th>Absent</th><th>Time</th></tr>
      ${recentSorted.map(({d,subj,tid,yr,recs,timeVal})=>{
        const p=recs.filter(a=>a.status==='present').length;
        return`<tr>
          <td style="color:var(--text2);font-size:12px">${formatDate(d)}</td>
          <td><strong>${subj}</strong></td>
          <td><span class="badge badge-gray" style="font-size:10px">${yr||'—'}</span></td>
          <td>${recs[0]?.teacher_name||'—'}</td>
          <td><span class="badge badge-green">${p}</span></td>
          <td><span class="badge badge-red">${recs.length-p}</span></td>
          <td style="color:var(--text2)">${formatTime(timeVal)}</td>
        </tr>`;
      }).join('')}
    </table></div>`}
  </div>`;
}

function filterStudents(){
  const q=document.getElementById('search-students').value.toLowerCase();
  const prog=document.getElementById('filter-program').value;
  document.querySelectorAll('#students-table tr[data-roll]').forEach(tr=>{
    const m=(!q||(tr.dataset.name.includes(q)||tr.dataset.roll.includes(q)))&&(!prog||tr.dataset.program===prog);
    tr.style.display=m?'':'none';
  });
}

function updateSubjectOverrides(){
  const prog=document.getElementById('ns-program').value;
  const wrap=document.getElementById('subject-overrides');
  if(!prog){wrap.style.display='none';return;}
  wrap.style.display='block';
  document.getElementById('subj-checkboxes').innerHTML=(DB.programs[prog]||[]).map(s=>`
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
      <input type="checkbox" value="${s}" checked style="width:14px;height:14px;accent-color:var(--green)"> ${s}
    </label>`).join('');
}

async function addStudent(){
  const roll=document.getElementById('ns-roll').value.trim().padStart(3,'0');
  const name=document.getElementById('ns-name').value.trim();
  const father=document.getElementById('ns-father').value.trim();
  const prog=document.getElementById('ns-program').value;
  const session=document.getElementById('ns-session').value;
  if(!roll||!name||!father||!prog||!session){showToast('Please fill all required fields (★)','error');return;}
  if(DB.students.find(s=>(s.roll||s.roll_no)===roll)){showToast('Roll number already exists','error');return;}
  const checked=[...document.querySelectorAll('#subj-checkboxes input:checked')].map(c=>c.value);
  const defaults=DB.programs[prog]||[];
  const subjectsStr=JSON.stringify(checked)===JSON.stringify(defaults)?'':checked.join(',');
  const phone=document.getElementById('ns-phone').value.trim();
  const blood=document.getElementById('ns-blood').value;
  const address=document.getElementById('ns-address').value.trim();
  const student={roll_no:roll,roll:roll,name,father_name:father,program:prog,subjects:subjectsStr,session,phone,blood_group:blood,address,photo:''};
  const btn=document.getElementById('add-student-btn');
  btn.innerHTML='<span class="spinner"></span> Saving...';btn.disabled=true;
  try{
    await sheetsCall({action:'saveStudent',student});
    DB.students.push(student);
    closeModal();showToast(`${name} added successfully`,'success');renderPage('students');
  }catch(e){showToast('Failed to save — check connection','error');btn.innerHTML='Add Student';btn.disabled=false;}
}

function updateEditSubjects(roll){

async function saveStudent(roll){
  const s=DB.students.find(x=>(x.roll||x.roll_no)===roll);
  s.name=document.getElementById('es-name').value.trim();
  s.father_name=document.getElementById('es-father')?.value.trim()||s.father_name||'';
  s.program=document.getElementById('es-program').value;
  s.session=document.getElementById('es-session')?.value||s.session||'';
  const checked=[...document.querySelectorAll('#edit-subj-checkboxes input:checked')].map(c=>c.value);
  s.subjects=checked.join(',');
  s.phone=document.getElementById('es-phone')?.value.trim()||s.phone||'';
  s.blood_group=document.getElementById('es-blood')?.value||s.blood_group||'';
  s.address=document.getElementById('es-address')?.value.trim()||s.address||'';
  const photoInput=document.getElementById('es-photo');
  if(photoInput&&photoInput.dataset.base64){s.photo=photoInput.dataset.base64;}
  const btn=document.getElementById('save-student-btn');
  btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;
  try{
    await sheetsCall({action:'saveStudent',student:{...s,roll_no:roll}});
    closeModal();showToast('Student updated','success');renderPage('students');
  }catch(e){showToast('Save failed','error');btn.innerHTML='Save';btn.disabled=false;}
}

async function deleteStudent(roll){
  if(!confirm('Delete this student?'))return;
  try{
    await sheetsCall({action:'deleteStudent',roll_no:roll});
    DB.students=DB.students.filter(s=>(s.roll||s.roll_no)!==roll);
    closeModal();showToast('Student deleted','success');renderPage('students');
  }catch(e){showToast('Delete failed','error');}
}

function getPKTTime(){
  // Pakistan Standard Time = UTC+5 always
  // Simply add 5 hours to UTC — no device timezone involved
  const now=new Date();
  const pkt=new Date(now.getTime()+5*60*60*1000);
  const h=pkt.getUTCHours();
  const m=pkt.getUTCMinutes();
  const ap=h>=12?'PM':'AM';
  const h12=h%12||12;
  return{timeStr:`${h12}:${String(m).padStart(2,'0')} ${ap}`,dayIndex:pkt.getUTCDay(),mins:h*60+m};
}

function getDayAbbr(){
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return days[new Date().getDay()];
}

function autoDetectSession(){
  if(currentRole!=='teacher')return null;
  const tid=currentUser.teacher.id||currentUser.teacher.teacher_id;
  const pkt=getPKTTime();
  const nowMins=pkt.mins;
  const today=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][pkt.dayIndex];
  if(nowMins===null)return null;
  const WINDOW=45;// ±45 minutes detection window

  // Get all assignments for this teacher
  const assignments=DB.teacherGroups.filter(tg=>tg.teacher_id===tid);
  
  // Find matches within time window AND matching day
  const matches=assignments.filter(tg=>{
    if(!tg.scheduled_time)return false;
    const schedMins=timeToMins(tg.scheduled_time);
    if(schedMins===null)return false;
    const diff=Math.abs(nowMins-schedMins);
    const dayAbbrs={'Monday':'Mon','Tuesday':'Tue','Wednesday':'Wed','Thursday':'Thu','Friday':'Fri','Saturday':'Sat','Sunday':'Sun'};
    const normDays=(tg.days||'').split(',').map(d=>{const t=d.trim();return dayAbbrs[t]||t;});
    const dayMatch=!tg.days||tg.days===''||normDays.includes(today);
    return diff<=WINDOW&&dayMatch;
  });

  if(!matches.length)return null;

  // Pick closest match
  const best=matches.reduce((a,b)=>{
    const aMins=timeToMins(a.scheduled_time);
    const bMins=timeToMins(b.scheduled_time);
    return Math.abs(nowMins-(aMins||0))<Math.abs(nowMins-(bMins||0))?a:b;
  });

  return best;
}

function toggleScanner(){
  const wrap=document.getElementById('scanner-wrap');if(!wrap)return;
  if(wrap.style.display==='none'){wrap.style.display='block';startScanner();}
  else{wrap.style.display='none';stopScanner();}
}

function startScanner(){
  stopScanner();
  try{
    scannerInstance=new Html5Qrcode('qr-reader');
    scannerInstance.start({facingMode:cameraFacing},{fps:10,qrbox:{width:220,height:220}},
      decoded=>handleScan(decoded),()=>{}).catch(()=>{
      document.getElementById('scan-result').textContent='Camera access denied. Use manual buttons.';
    });
  }catch(e){document.getElementById('scan-result').textContent='Scanner not available.';}
}
function switchCamera(){
  cameraFacing=cameraFacing==='user'?'environment':'user';
  const btn=document.getElementById('cam-switch-btn');
  if(btn)btn.textContent=cameraFacing==='user'?'🔄 Back Cam':'🔄 Front Cam';
  const wrap=document.getElementById('scanner-wrap');
  if(wrap&&wrap.style.display!=='none'){stopScanner();startScanner();}
}

function stopScanner(){
  if(scannerInstance){scannerInstance.stop().catch(()=>{});scannerInstance=null;}
}

function handleScan(decoded){
  if(!currentScanSession)return;
  const raw=String(decoded).trim();
  const parts=raw.split('-');
  const roll=parts.length===2?parts[1].padStart(3,'0'):raw.padStart(3,'0');
  const yearPrefix=parts.length===2?parts[0]:'';
  const student=currentScanSession.enrolled.find(s=>{
    const sRoll=String(s.roll||s.roll_no).padStart(3,'0');
    const sYear=(s.program||'').includes('1st Year')?'1':'2';
    if(yearPrefix)return sRoll===roll&&sYear===yearPrefix;
    return sRoll===roll;
  });
  if(!student){document.getElementById('scan-result').textContent=`⚠️ Roll ${roll} not in this subject.`;return;}
  const uid=getQRValue(student);
  if(currentScanSession.present.has(uid)){document.getElementById('scan-result').textContent=`ℹ️ ${student.name} already marked present.`;return;}
  markStudent(uid,'present');
  document.getElementById('scan-result').textContent=`✅ ${student.name} (${roll}) — Present`;
}
function markStudent(roll,status){
  if(!currentScanSession)return;
  if(status==='present'){
    if(currentScanSession.present.has(roll)){
      currentScanSession.present.delete(roll);
      status='none';
    } else {
      currentScanSession.present.add(roll);
      currentScanSession.absent.delete(roll);
    }
  } else if(status==='absent'){
    if(currentScanSession.absent.has(roll)){
      currentScanSession.absent.delete(roll);
      status='none';
    } else {
      currentScanSession.absent.add(roll);
      currentScanSession.present.delete(roll);
    }
  }
 const row=document.getElementById('sr-'+roll);
  if(row){
    row.className='student-row '+(status==='present'?'present':status==='absent'?'absent':'');
    const btns=row.querySelectorAll('.attend-btns .btn');
    btns[0].className='btn btn-sm '+(status==='present'?'btn-success':'btn-outline');
    btns[1].className='btn btn-sm '+(status==='absent'?'btn-danger':'btn-outline');
  }
  const{present,absent,enrolled}=currentScanSession;
  const cp=document.getElementById('cnt-present'),ca=document.getElementById('cnt-absent'),cpe=document.getElementById('cnt-pending');
  if(cp)cp.textContent=present.size;if(ca)ca.textContent=absent.size;if(cpe)cpe.textContent=enrolled.length-present.size-absent.size;
}

function markAllPresent(){
  if(!currentScanSession)return;
  currentScanSession.enrolled.forEach(s=>currentScanSession.present.add(getQRValue(s)));
  currentScanSession.absent.clear();renderScanInterface();
}
function clearAll(){
  if(!currentScanSession)return;
  if(!confirm('Clear all attendance marks and restart?'))return;
  currentScanSession.present.clear();
  currentScanSession.absent.clear();
  renderScanInterface();
}
async function submitAttendance(){
  if(!currentScanSession)return;
  const btn=document.getElementById('submit-btn');
  if(btn&&btn.dataset.submitted==='yes'){
    showToast('Already submitted — select a new subject for new attendance','error');
    return;
  }
  const{subject,year,present,absent,enrolled}=currentScanSession;
  if(enrolled.length===0){showToast('No students loaded','error');return;}
  const date=document.getElementById('att-date').value;
  const teacher=currentUser.teacher;
  const time=new Date().toLocaleTimeString('en-PK',{hour:'2-digit',minute:'2-digit'});
  const records=enrolled.map(s=>{
    const uid=getQRValue(s);
    return{
      date,subject,year:year||'',
      roll_no:s.roll||s.roll_no,
      qr_code:uid,
      status:present.has(uid)?'present':'absent',
      teacher_name:teacher.name,
      teacher_id:teacher.id||teacher.teacher_id,
      time
    };
  });
  // Lock button FIRST — before anything else — prevents double tap
  if(btn){
    btn.innerHTML='<span class="spinner"></span> Saving...';
    btn.disabled=true;
    btn.dataset.submitted='yes';
  }
  // Send to Sheets — single path
  sheetsCall({action:'saveAttendance',records});
  // Update local DB so reports work immediately on this device
  DB.attendance=DB.attendance.filter(a=>!(
    String(a.date).split('T')[0]===date&&
    String(a.subject)===subject&&
    String(a.year||'')===String(year||'')&&
    String(a.teacher_id||'')===String(teacher.id||teacher.teacher_id||'')
  ));
  DB.attendance.push(...records);
  stopScanner();
  // Show final submitted state
  if(btn){
    btn.innerHTML='✓ Submitted';
    btn.style.background='#6b7280';
    btn.style.cursor='not-allowed';
  }
  showToast(`✓ ${present.size} present, ${enrolled.length-present.size} absent — saved to Sheets`,'success');
}

function buildReportTable(prog,filter){
  let students=prog?DB.students.filter(s=>s.program===prog):[...DB.students];
  if(filter==='good')students=students.filter(s=>{const st=DB.getAttendanceStats(s.roll||s.roll_no);return st.total>0&&st.pct>=75;});
  if(filter==='warning')students=students.filter(s=>{const st=DB.getAttendanceStats(s.roll||s.roll_no);return st.total>0&&st.pct>=60&&st.pct<75;});
  if(filter==='critical')students=students.filter(s=>{const st=DB.getAttendanceStats(s.roll||s.roll_no);return st.total>0&&st.pct>=40&&st.pct<60;});
  if(filter==='detained')students=students.filter(s=>{const st=DB.getAttendanceStats(s.roll||s.roll_no);return st.total>0&&st.pct<40;});
  if(filter==='action')students=students.filter(s=>{const st=DB.getAttendanceStats(s.roll||s.roll_no);return st.total>0&&st.pct<75;});
  if(!students.length)return`<div class="alert alert-info">No students match this filter.</div>`;
  return`<div class="table-wrap"><table>
    <tr><th>Roll</th><th>Name</th><th>Program</th><th>Classes</th><th>Present</th><th>Absent</th><th>Attendance %</th><th>Status</th></tr>
    ${students.map(s=>{
      const roll=s.roll||s.roll_no;
      const st=DB.getAttendanceStats(roll);const pct=st.pct;
      const status=st.total===0?'no-data':pct>=75?'good':pct>=60?'warning':pct>=40?'critical':'detained';
      const badge={
        'no-data':'<span class="badge badge-gray">No Data</span>',
        'good':'<span class="badge badge-green">✓ Regular</span>',
        'warning':'<span class="badge badge-amber">⚠ Irregular</span>',
        'critical':'<span class="badge badge-red">✗ Critical</span>',
        'detained':'<span style="background:#1a1a1a;color:#fff;display:inline-flex;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600">⛔ Debarred</span>'
      }[status];
      const barColor=pct>=75?'green':pct>=60?'amber':'red';
      return`<tr style="${status==='detained'?'background:#f5f5f5':''}">
        <td><span class="badge badge-gold">${roll}</span></td>
        <td><strong style="cursor:pointer;color:var(--green-dark);text-decoration:underline dotted" onclick="showSubjectReport('${roll}')">${s.name}</strong></td>
        <td style="font-size:11px">${s.program}</td>
        <td>${st.total}</td>
        <td style="color:var(--green);font-weight:700">${st.present}</td>
        <td style="color:var(--red);font-weight:700">${st.total-st.present}</td>
        <td>${st.total>0?`<div style="display:flex;align-items:center;gap:6px"><div class="progress" style="flex:1;min-width:50px"><div class="progress-bar ${barColor}" style="width:${pct}%"></div></div><strong>${pct}%</strong></div>`:'—'}</td>
        <td>${badge}</td>
      </tr>`;
    }).join('')}
  </table></div>`;
}

function previewPhoto(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  if(file.size>600000){showToast('Photo too large — max 600KB','error');input.value='';return;}
  const reader=new FileReader();
  reader.onload=e=>{
    input.dataset.base64=e.target.result;
    const prev=document.getElementById('photo-preview');
    if(prev)prev.innerHTML=`<img src="${e.target.result}" style="width:55px;height:70px;object-fit:cover;border-radius:3px;border:1px solid var(--border)">`;
  };
  reader.readAsDataURL(file);
}

async function saveTimetableRow(){

  const group=document.getElementById('tt-group').value;
  const scheduled_time=document.getElementById('tt-time').value;
  const dayBoxes=document.querySelectorAll('input[name="tt-day"]:checked');
  const days=[...dayBoxes].map(d=>d.value).join(',');
  const newRow={teacher_id:tid,teacher_name:teacher?teacher.name:'',subject,year,group,scheduled_time,days};
  const exists=DB.teacherGroups.find(tg=>tg.teacher_id===tid&&tg.subject===subject&&tg.year===year&&tg.group===group);

async function updateTimetableRow(idx){
  const tid=document.getElementById('tt-teacher').value;
  const teacher=DB.teachers.find(t=>(t.id||t.teacher_id)===tid);
  const subject=document.getElementById('tt-subject').value;
  const year=document.getElementById('tt-year').value;
  const group=document.getElementById('tt-group').value;
  const scheduled_time=document.getElementById('tt-time').value;
  const oldRow=DB.teacherGroups[idx];
  const dayBoxesU=document.querySelectorAll('input[name="tt-day"]:checked');
  const days=[...dayBoxesU].map(d=>d.value).join(',');
  const newRow={teacher_id:tid,teacher_name:teacher?teacher.name:'',subject,year,group,scheduled_time,days};

  closeModal();showToast('Updated','success');renderPage('timetable');

async function deleteTimetableRow(idx){

  showToast('Deleted','success');renderPage('timetable');
}

async function saveMarksEntry(prog,testType,month){
  const subjects=DB.programs[prog]||[];
  const students=DB.students.filter(s=>s.program===prog);
  const records=[];
  students.forEach(s=>{
    const roll=String(s.roll||s.roll_no).padStart(3,'0');
    subjects.forEach(subj=>{
      const inp=document.getElementById('mk-'+roll+'-'+subj.replace(/[^a-zA-Z0-9]/g,'_'));
      const totInp=document.getElementById('mktot-'+subj.replace(/[^a-zA-Z0-9]/g,'_'));
      const st=totInp?parseInt(totInp.value)||50:50;
      const absChk=document.getElementById('mkabs-'+roll+'-'+subj.replace(/[^a-zA-Z0-9]/g,'_'));
      const isAbsent=absChk&&absChk.checked;
      // Save if marks entered OR if marked absent
      if((inp&&inp.value!=='')||isAbsent){
        const appeared=isAbsent?'no':'yes';
        records.push({roll_no:roll,name:s.name,program:prog,test_type:testType,month_year:month,subject:subj,obtained:isAbsent?0:parseFloat(inp.value)||0,total:st,appeared});
      }
    });
  });
  if(!records.length){showToast('No marks entered yet','error');return;}
  const btn=document.getElementById('save-marks-btn');
  if(btn){btn.innerHTML='<span class="spinner"></span> Saving...';btn.disabled=true;}
  // Update local DB — remove old records for this test then add new
  DB.marks=DB.marks.filter(m=>!(m.program===prog&&m.test_type===testType&&m.month_year===month));
  DB.marks.push(...records);
  await sheetsCall({action:'saveMarks',records,program:prog,test_type:testType,month_year:month});
  if(btn){btn.innerHTML='💾 Save All Marks';btn.disabled=false;}
  showToast(`✓ ${records.length} marks saved`,'success');
}

function formatScheduledTime(t){
  if(!t||!String(t).trim())return'—';
  const s=String(t).trim();
  // Handle Sheets date-time format 1899-12-30T09:00:00.000Z
  if(s.includes('1899-12-30T')){
    const parts=s.replace('1899-12-30T','').replace('.000Z','').split(':');
    if(parts.length>=2){
      let h=parseInt(parts[0]);const m=parts[1];
      const ap=h>=12?'PM':'AM';
      h=h%12||12;
      return h+':'+m+' '+ap;
    }
  }
  return s;
}

function timeToMins(t){
  if(!t)return null;
  const s=String(t);
  let h,m;
  if(s.includes('1899-12-30T')){
    const parts=s.replace('1899-12-30T','').replace('.000Z','').split(':');
    h=parseInt(parts[0]);m=parseInt(parts[1]||0);
  } else if(s.includes('AM')||s.includes('PM')){
    const match=s.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if(!match)return null;
    h=parseInt(match[1]);m=parseInt(match[2]);
    if(match[3].toUpperCase()==='PM'&&h!==12)h+=12;
    if(match[3].toUpperCase()==='AM'&&h===12)h=0;
  } else if(s.includes(':')&&s.length<=5){
    const parts=s.split(':');h=parseInt(parts[0]);m=parseInt(parts[1]||0);
  } else return null;
  if(isNaN(h)||isNaN(m))return null;
  return h*60+m;
}

function minsToTimeStr(mins){
  if(mins===null||mins===undefined)return'—';
  const h=Math.floor(mins/60),m=mins%60;
  const ap=h>=12?'PM':'AM';
  return`${h%12||12}:${String(m).padStart(2,'0')} ${ap}`;
}

function getWeekStart(){
  const d=new Date(new Date().getTime()+5*60*60*1000);
  d.setUTCDate(d.getUTCDate()-d.getUTCDay());
  return d.toISOString().split('T')[0];
}
function getMonthStart(){
  const d=new Date(new Date().getTime()+5*60*60*1000);
  return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-01';
}

function getExpectedSessions(tid, filterStart, filterEnd){
  // Get all TeacherGroup assignments for this teacher
  const assignments = DB.teacherGroups.filter(tg => tg.teacher_id === tid && tg.days && tg.days.trim() !== '');
  if(!assignments.length) return [];

  const dayMap = {'Mon':1,'Tue':2,'Wed':3,'Thu':4,'Fri':5,'Sat':6,'Sun':0};
  const expected = [];

  // Iterate each past day in the filter period
  const start = new Date(filterStart);
  const end = new Date(filterEnd);
  const today = new Date();
  // Never go beyond today
  if(end > today) end.setTime(today.getTime());

  for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
    const dayAbbr = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    const dateStr = d.toISOString().split('T')[0];

    assignments.forEach(tg => {
      const scheduledDays = (tg.days||'').split(',').map(x=>{const t=x.trim();return {'Monday':'Mon','Tuesday':'Tue','Wednesday':'Wed','Thursday':'Thu','Friday':'Fri','Saturday':'Sat','Sunday':'Sun'}[t]||t;});
      if(scheduledDays.includes(dayAbbr)){
        expected.push({
          date: dateStr,
          subject: tg.subject,
          year: tg.year,
          group: tg.group,
          scheduledMins: timeToMins(tg.scheduled_time)
        });
      }
    });
  }
  return expected;
}

function showTeacherPunctReport(tid){
  const teacher=DB.teachers.find(t=>(t.id||t.teacher_id)===tid);
  if(!teacher)return;
  const name=teacher.name||tid;

  // Determine filter period based on current punctFilter
  const today=todayStr();
  const weekStart=getWeekStart();
  const monthStart=getMonthStart();
  let filterStart, filterLabel;
  if(punctFilter==='today'){filterStart=today;filterLabel='Today';}
  else if(punctFilter==='week'){filterStart=weekStart;filterLabel='This Week';}
  else if(punctFilter==='month'){filterStart=monthStart;filterLabel='This Month';}
  else{
    // All time — use earliest attendance date
    const dates=DB.attendance.map(a=>String(a.date||'').split('T')[0]).filter(Boolean).sort();
    filterStart=dates[0]||today;
    filterLabel='All Time';
  }

  // Get submitted sessions for this teacher in period
  const recs=DB.attendance.filter(a=>{
    const d=String(a.date||'').split('T')[0];
    return String(a.teacher_id||'')===String(tid)&&d>=filterStart&&d<=today;
  });

  const sessionKeys=[...new Set(recs.map(a=>String(a.date||'').split('T')[0]+'||'+a.subject+'||'+(a.year||'')))];

  const submitted=sessionKeys.map(key=>{
    const[date,subject,year]=key.split('||');
    const sessionRecs=recs.filter(a=>String(a.date||'').split('T')[0]===date&&a.subject===subject&&(a.year||'')===year);
    const tg=DB.teacherGroups.find(tg=>tg.teacher_id===tid&&tg.subject===subject&&(tg.year===year||!year));
    const submittedMins=timeToMins(sessionRecs[0]?.time);
    const scheduledMins=tg?.scheduled_time?timeToMins(tg.scheduled_time):null;
    let delayMins=null,status='no-schedule';
    if(submittedMins!==null&&scheduledMins!==null){
      delayMins=submittedMins-scheduledMins;
      status=delayMins<=10?'ontime':delayMins<=20?'late':'verylate';
    }
    return{date,subject,year,submittedMins,scheduledMins,delayMins,status,submitted:true,
      students:sessionRecs.length,present:sessionRecs.filter(a=>a.status==='present').length};
  }).sort((a,b)=>b.date.localeCompare(a.date));

  // Get expected sessions from timetable
  const expected=getExpectedSessions(tid,filterStart,today);

  // Find missed sessions — expected but not submitted
  const missed=expected.filter(exp=>{
    return!submitted.find(s=>s.date===exp.date&&s.subject===exp.subject&&s.year===exp.year);
  });

  // Stats
  const withSched=submitted.filter(s=>s.scheduledMins!==null);
  const onTime=withSched.filter(s=>s.status==='ontime').length;
  const late=withSched.filter(s=>s.status==='late').length;
  const veryLate=withSched.filter(s=>s.status==='verylate').length;
  const avgDelay=withSched.length?Math.round(withSched.reduce((a,b)=>a+(b.delayMins||0),0)/withSched.length):null;
  const onTimePct=withSched.length?Math.round(onTime/withSched.length*100):null;
  const compliancePct=expected.length?Math.round(submitted.length/expected.length*100):null;
  const col=onTimePct===null?'var(--text2)':onTimePct>=85?'var(--green)':onTimePct>=70?'var(--amber)':'var(--red)';
  const compCol=compliancePct===null?'var(--text2)':compliancePct>=90?'var(--green)':compliancePct>=70?'var(--amber)':'var(--red)';

  showModal(`⏰ ${name} — Punctuality Report (${filterLabel})`,`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
      <div style="background:var(--surface2);border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:800;color:var(--text)">${expected.length}</div>
        <div style="font-size:10px;color:var(--text2)">Expected Sessions</div>

}


function renderPunctContent(){
  const _pc=document.getElementById('punct-content');
  if(!_pc)return;
  const today=todayStr();
  const weekStart=getWeekStart();
  const monthStart=getMonthStart();

  // Filter attendance by period
  let recs=DB.attendance;
  if(punctFilter==='today') recs=recs.filter(a=>String(a.date||'').split('T')[0]===today);
  else if(punctFilter==='week') recs=recs.filter(a=>String(a.date||'').split('T')[0]>=weekStart);
  else if(punctFilter==='month') recs=recs.filter(a=>String(a.date||'').split('T')[0]>=monthStart);

  // Get unique sessions (date+subject+teacher)
  const sessionKeys=[...new Set(recs.map(a=>String(a.date||'').split('T')[0]+'||'+a.subject+'||'+(a.teacher_id||'')))];

  if(!sessionKeys.length){
    document.getElementById('punct-content').innerHTML=`<div class="alert alert-info">No sessions found for this period.</div>`;
    return;
  }

  // Build session objects with scheduled time lookup
  const sessions=sessionKeys.map(key=>{
    const[date,subject,tid]=key.split('||');
    const sessionRecs=recs.filter(a=>String(a.date||'').split('T')[0]===date&&a.subject===subject&&String(a.teacher_id||'')===tid);
    const teacher=DB.teachers.find(t=>(t.id||t.teacher_id)===tid);
    const yearLabel=(sessionRecs[0]?.year||'');
    const tg=DB.teacherGroups.find(tg=>tg.teacher_id===tid&&tg.subject===subject&&(tg.year===yearLabel||!yearLabel));
    const submittedMins=timeToMins(sessionRecs[0]?.time);
    const scheduledMins=tg?.scheduled_time?timeToMins(tg.scheduled_time+':00'):null;
    let delayMins=null,status='unknown';
    if(submittedMins!==null&&scheduledMins!==null){
      delayMins=submittedMins-scheduledMins;
      status=delayMins<=10?'ontime':delayMins<=20?'late':'verylate';
    } else if(submittedMins!==null){
      status='submitted';
    }
    const group=tg?.group??(tg?.group||'');
    const classLabel=yearLabel+(group?' '+(group==='science'?'Science':'Arts'):'');
    return{date,subject,tid,teacherName:sessionRecs[0]?.teacher_name||tid,submittedMins,scheduledMins,delayMins,status,classLabel,total:sessionRecs.length,present:sessionRecs.filter(a=>a.status==='present').length};
  }).sort((a,b)=>b.date.localeCompare(a.date)||( (a.scheduledMins||0)-(b.scheduledMins||0)));

  // Stats
  const withSchedule=sessions.filter(s=>s.scheduledMins!==null);
  const onTime=withSchedule.filter(s=>s.status==='ontime').length;
  const late=withSchedule.filter(s=>s.status==='late').length;
  const veryLate=withSchedule.filter(s=>s.status==='verylate').length;
  const noSchedule=sessions.filter(s=>s.scheduledMins===null).length;

  // Per-teacher stats for cards
  const teacherMap={};
  sessions.forEach(s=>{
    if(!teacherMap[s.tid])teacherMap[s.tid]={name:s.teacherName,tid:s.tid,sessions:[],allMins:[],scheduledMins:[]};
    teacherMap[s.tid].sessions.push(s);
    if(s.submittedMins!==null)teacherMap[s.tid].allMins.push(s.submittedMins);
    if(s.scheduledMins!==null)teacherMap[s.tid].scheduledMins.push(s);
  });

  const teacherStats=Object.values(teacherMap).map(t=>{
    const withSched=t.scheduledMins;
    const onT=withSched.filter(s=>s.status==='ontime').length;
    const onTimePct=withSched.length?Math.round(onT/withSched.length*100):null;
    const avgDelay=withSched.length?Math.round(withSched.reduce((a,b)=>a+(b.delayMins||0),0)/withSched.length):null;
    const avgSubmit=t.allMins.length?Math.round(t.allMins.reduce((a,b)=>a+b,0)/t.allMins.length):null;
    const submissionPct=Math.round(t.sessions.length/Math.max(t.sessions.length,1)*100);
    // Trend: compare first half vs second half delay
    let trend='➡️ Stable';
    if(withSched.length>=4){
      const half=Math.floor(withSched.length/2);
      const firstHalf=withSched.slice(0,half).reduce((a,b)=>a+(b.delayMins||0),0)/half;
      const secondHalf=withSched.slice(-half).reduce((a,b)=>a+(b.delayMins||0),0)/half;
      if(secondHalf<firstHalf-5)trend='📈 Improving';
      else if(secondHalf>firstHalf+5)trend='📉 Declining';
    }
    return{...t,onTimePct,avgDelay,avgSubmit,submissionPct,trend,totalSessions:t.sessions.length};
  }).sort((a,b)=>(b.onTimePct||0)-(a.onTimePct||0));

  // Time-slot analysis
  const slotMap={};
  sessions.filter(s=>s.scheduledMins!==null).forEach(s=>{
    const slotKey=minsToTimeStr(s.scheduledMins);
    if(!slotMap[slotKey])slotMap[slotKey]={slot:slotKey,scheduledMins:s.scheduledMins,total:0,ontime:0,late:0,verylate:0};
    slotMap[slotKey].total++;
    slotMap[slotKey][s.status]=(slotMap[slotKey][s.status]||0)+1;
  });
  const slotStats=Object.values(slotMap).sort((a,b)=>a.scheduledMins-b.scheduledMins);

  // Alerts
  const alertTeachers=teacherStats.filter(t=>t.onTimePct!==null&&t.onTimePct<70&&t.totalSessions>=3);
  const starTeachers=teacherStats.filter(t=>t.onTimePct!==null&&t.onTimePct>=95&&t.totalSessions>=3);

  document.getElementById('punct-content').innerHTML=`
    <!-- STAT CARDS -->
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card sc-green"><div class="stat-label">On Time</div><div class="stat-value" style="color:var(--green)">${onTime}</div><div class="stat-sub">${withSchedule.length?Math.round(onTime/withSchedule.length*100):0}% of scheduled</div></div>
      <div class="stat-card sc-gold"><div class="stat-label">Late (10-20 min)</div><div class="stat-value" style="color:var(--amber)">${late}</div><div class="stat-sub">${withSchedule.length?Math.round(late/withSchedule.length*100):0}% of scheduled</div></div>
      <div class="stat-card sc-red"><div class="stat-label">Very Late (>20 min)</div><div class="stat-value" style="color:var(--red)">${veryLate}</div><div class="stat-sub">${withSchedule.length?Math.round(veryLate/withSchedule.length*100):0}% of scheduled</div></div>
      <div class="stat-card sc-gray"><div class="stat-label">No Schedule Set</div><div class="stat-value">${noSchedule}</div><div class="stat-sub">Set in Timetable tab</div></div>
    </div>

    ${alertTeachers.length?`<div class="alert alert-warning" style="margin-bottom:12px">⚠️ ${alertTeachers.length} teacher(s) below 70% punctuality this period.</div>`:''}
    ${starTeachers.length?`<div class="alert alert-info" style="margin-bottom:16px">⭐ ${starTeachers.map(t=>t.name).join(', ')} — exemplary punctuality (95%+)</div>`:''}

    <!-- TODAY'S SESSION TABLE -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><span class="card-title">📅 Session Details</span><span class="badge badge-gray">${sessions.length} sessions</span></div>
      <div class="table-wrap"><table>
        <tr><th>Date</th><th>Teacher</th><th>Subject</th><th>Class</th><th>Scheduled</th><th>Submitted</th><th>Delay</th><th>Status</th></tr>
        ${sessions.map(s=>{
          const delayStr=s.delayMins===null?'—':s.delayMins<=0?`<span style="color:var(--green)">${Math.abs(s.delayMins)} min early</span>`:`<span style="color:${s.delayMins<=20?'var(--amber)':'var(--red)'}">+${s.delayMins} min</span>`;
          const statusBadge=s.status==='ontime'?'<span class="badge badge-green">✓ On Time</span>':s.status==='late'?'<span class="badge badge-amber">⚠ Late</span>':s.status==='verylate'?'<span class="badge badge-red">✗ Very Late</span>':'<span class="badge badge-gray">No Schedule</span>';
          const rowStyle=s.status==='verylate'?'background:var(--red-light)':s.status==='late'?'background:var(--amber-light)':'';
          return`<tr style="${rowStyle}">
            <td style="font-size:11px;color:var(--text2)">${formatDate(s.date)}</td>
            <td><strong style="cursor:pointer;color:var(--green);text-decoration:underline" onclick="showTeacherPunctReport('${s.tid}')">${s.teacherName}</strong></td>
            <td>${s.subject}</td>
            <td style="font-size:11px">${s.classLabel||'—'}</td>
            <td style="font-weight:600">${s.scheduledMins!==null?minsToTimeStr(s.scheduledMins):'—'}</td>
            <td style="font-weight:600;color:${s.status==='ontime'?'var(--green)':s.status==='late'?'var(--amber)':'var(--red)'}">${s.submittedMins!==null?minsToTimeStr(s.submittedMins):'—'}</td>
            <td>${delayStr}</td>
            <td>${statusBadge}</td>
          </tr>`;
        }).join('')}
      </table></div>
    </div>

    <!-- TEACHER PERFORMANCE CARDS -->
    <div class="card-header" style="margin-bottom:12px"><span style="font-size:15px;font-weight:700;color:var(--text)">👥 Teacher Performance</span></div>
    <div class="punct-grid" style="margin-bottom:24px">
      ${teacherStats.map(t=>{
        const pct=t.onTimePct;
        const col=pct===null?'var(--text3)':pct>=85?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
        const borderCol=pct===null?'var(--border)':pct>=85?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
        const badgeLabel=pct===null?'No Schedule':pct>=95?'✓ Excellent':pct>=85?'✓ Good':pct>=70?'⚠ Watch':'⚠ Attention Needed';
        const badgeStyle=pct===null?'background:var(--surface2);color:var(--text2)':pct>=85?'background:var(--green-light);color:#1b5e20':pct>=70?'background:var(--amber-light);color:#7c3200':'background:var(--red-light);color:#b71c1c';
        const avgDelayStr=t.avgDelay===null?'No schedule set':t.avgDelay<=0?`${Math.abs(t.avgDelay)} min early`:`${t.avgDelay} min late`;
        const avgDelayCol=t.avgDelay===null?'var(--text3)':t.avgDelay<=0?'var(--green)':t.avgDelay<=15?'var(--amber)':'var(--red)';
        return`<div class="perf-card" style="border-left:4px solid ${borderCol}">
          <div class="perf-card-header">
            <strong style="font-size:14px;cursor:pointer;color:var(--green);text-decoration:underline" onclick="showTeacherPunctReport('${t.tid}')">${t.name}</strong>
            <span style="font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600;${badgeStyle}">${badgeLabel}</span>
          </div>
          <div class="perf-metric">
            <div class="perf-metric-label">Punctuality Rate</div>
            ${pct!==null?`<div style="display:flex;align-items:center;gap:8px"><div class="progress" style="flex:1"><div class="progress-bar ${pct>=75?'green':pct>=50?'amber':'red'}" style="width:${pct}%"></div></div><strong style="color:${col}">${pct}%</strong></div>`:'<div style="color:var(--text3);font-size:12px">Set scheduled times in Timetable tab</div>'}
          </div>
          <div class="perf-metric">
            <div class="perf-metric-label">Sessions Submitted</div>
            <div class="perf-metric-value">${t.totalSessions} total</div>
          </div>
          <div class="perf-metric">
            <div class="perf-metric-label">Avg Submission Time</div>
            <div class="perf-metric-value">${minsToTimeStr(t.avgSubmit)}</div>
          </div>
          <div class="perf-metric">
            <div class="perf-metric-label">Average Delay</div>
            <div class="perf-metric-value" style="color:${avgDelayCol}">${avgDelayStr}</div>
          </div>
          <div class="perf-metric">
            <div class="perf-metric-label">Trend</div>
            <div class="perf-metric-value">${t.trend}</div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- TIME SLOT ANALYSIS -->
    ${slotStats.length?`<div class="card" style="margin-bottom:20px">
      <div class="card-header"><span class="card-title">🕐 Time-Slot Analysis</span></div>
      <div class="table-wrap"><table>
        <tr><th>Time Slot</th><th>Total</th><th>On Time</th><th>Late</th><th>Very Late</th><th>Punctuality %</th><th>Note</th></tr>
        ${slotStats.map(sl=>{
          const pct=Math.round((sl.ontime||0)/sl.total*100);
          const note=pct<60?'⚠️ High delay rate':pct<75?'⚠️ Needs improvement':pct>=90?'✓ Best slot':'✓ Good';
          const noteCol=pct<60?'var(--red)':pct<75?'var(--amber)':'var(--green)';
          const rowStyle=pct<60?'background:var(--red-light)':pct<75?'background:var(--amber-light)':'';
          return`<tr style="${rowStyle}">
            <td><strong>${sl.slot}</strong></td>
            <td>${sl.total}</td>
            <td style="color:var(--green);font-weight:700">${sl.ontime||0}</td>
            <td style="color:var(--amber);font-weight:700">${sl.late||0}</td>
            <td style="color:var(--red);font-weight:700">${sl.verylate||0}</td>
            <td><div style="display:flex;align-items:center;gap:6px"><div class="progress" style="flex:1;min-width:60px"><div class="progress-bar ${pct>=75?'green':pct>=50?'amber':'red'}" style="width:${pct}%"></div></div><strong>${pct}%</strong></div></td>
            <td style="font-size:12px;color:${noteCol}">${note}</td>
          </tr>`;
        }).join('')}
      </table></div>
    </div>`:''}

    <!-- ALERTS -->
    <div class="card">
      <div class="card-header"><span class="card-title">🔔 Alerts & Recommendations</span></div>
      ${alertTeachers.map(t=>`<div class="alert alert-warning" style="margin-bottom:8px">⚠️ <strong>${t.name}:</strong> Only ${t.onTimePct}% on time. Avg delay ${t.avgDelay} min. Recommend discussion.</div>`).join('')}
      ${starTeachers.map(t=>`<div class="alert alert-info" style="margin-bottom:8px">⭐ <strong>${t.name}:</strong> Exemplary ${t.onTimePct}% punctuality. Consider recognising in staff meeting.</div>`).join('')}
      ${!alertTeachers.length&&!starTeachers.length?'<p style="color:var(--text2);font-size:13px;padding:8px 0">No alerts for this period.</p>':''}
    </div>`;
}


function deleteMarksPrompt(roll,name){
  const studentMarks=DB.marks.filter(m=>String(m.roll_no).padStart(3,'0')===roll);
  const tests=[...new Set(studentMarks.map(m=>m.test_type+' — '+m.month_year))];
  if(!tests.length){showToast('No marks records to delete','error');return;}
  showModal('🗑 Delete Marks Record',`
    <div class="alert alert-warning" style="margin-bottom:16px">⚠️ Deleting a record cannot be undone.</div>
    <div class="form-group"><label>Select Record to Delete</label>
      <select id="del-marks-select" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px">
        ${tests.map(t=>`<option value="${t}">${t}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-danger btn-sm" onclick="confirmDeleteMarks('${roll}','${name}')">Delete This Record</button>
      <button class="btn btn-outline btn-sm" onclick="showMarksReport()">Cancel</button>
    </div>`);
}

async function confirmDeleteMarks(roll,name){
  const sel=document.getElementById('del-marks-select');
  if(!sel)return;
  const val=sel.value;
  const[testType,monthYear]=val.split(' — ');
  if(!confirm('Delete '+testType+' ('+monthYear+') for '+name+'?'))return;
  DB.marks=DB.marks.filter(m=>!(
    String(m.roll_no).padStart(3,'0')===roll&&
    m.test_type===testType&&
    m.month_year===monthYear
  ));
  await sheetsCall({action:'deleteMarks',roll_no:roll,test_type:testType,month_year:monthYear});
  closeModal();
  showToast('Record deleted','success');
}

function printStudentReport(roll){

  const body='<div class="header"><h2>Government Graduate College Phoolnagar</h2><div class="sub">Student Result &amp; Attendance Report &nbsp;|&nbsp; Issued: '+issued+'</div></div><div style="margin-bottom:12px"><strong>Name:</strong> '+name+' &nbsp;&nbsp; <strong>Roll:</strong> '+roll+' &nbsp;&nbsp; <strong>Program:</strong> '+prog+'</div>'+el.innerHTML;
  const win=window.open('','_blank');

}

function toggleMarkAbsent(roll,subj,isAbsent,subjects){

  const inp=document.getElementById('mk-'+roll+'-'+safeSubj);

    inp.style.background=isAbsent?'#ffebee':'';

  updateRowTotal(roll,subjects);
}
function getFineRates(){
  try{
    const r=JSON.parse(localStorage.getItem('ggc_fine_rates')||'{}');
    return{
      perClass:r.perClass||1,
      monthlyTest:r.monthlyTest||50,
      decSendup:r.decSendup||100
    };
  }catch(e){return{perClass:1,monthlyTest:50,decSendup:100};}
}

function saveFineRates(){
  const rates={
    perClass:parseFloat(document.getElementById('fr-class').value)||1,
    monthlyTest:parseFloat(document.getElementById('fr-monthly').value)||50,
    decSendup:parseFloat(document.getElementById('fr-dec').value)||100
  };
  localStorage.setItem('ggc_fine_rates',JSON.stringify(rates));
  showToast('Fine rates saved','success');
}
