<script>

async function loadFromSheets(){
  try{
    document.getElementById('loading-msg').textContent='Loading college data...';
    const res=await fetch(SCRIPT_URL+'?t='+Date.now());
    const data=await res.json();
    if(data.success){
      if(data.students&&data.students.length){
        DB.students=data.students.map(s=>({
          ...s,
          roll:String(s.roll_no||s.roll||'').padStart(3,'0')
        }));
      }
      if(data.teachers&&data.teachers.length){
        DB.teachers=data.teachers.map(t=>({
          ...t,
          id:t.teacher_id||t.id,
          subjects:typeof t.subjects==='string'?t.subjects.split(',').map(x=>x.trim()):(t.subjects||[])
        }));
      }
      if(data.attendance&&data.attendance.length){
        DB.attendance=data.attendance.map(a=>({
          ...a,
          date:a.date.split('T')[0],
          status:a.status||'absent'
        }));
      }
      if(data.programs&&Object.keys(data.programs).length){
        DB.programs=data.programs;
      }
      if(data.teacherGroups&&data.teacherGroups.length){
        DB.teacherGroups=data.teacherGroups;
      }
      sheetsReady=true;
      document.getElementById('sheets-status').textContent='✓ Connected to Google Sheets';
      document.getElementById('sheets-status').style.color='#1b5e20';
    }else{
      document.getElementById('sheets-status').textContent='⚠ Could not load data';
    }
  }catch(e){
    document.getElementById('sheets-status').textContent='⚠ Offline — data will not be saved';
  }
  document.getElementById('loading-overlay').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

// ... (existing functions remain the same) ...

async function addStudent(){
  const roll=document.getElementById('ns-roll').value.trim().padStart(3,'0');
  const name=document.getElementById('ns-name').value.trim();
  const prog=document.getElementById('ns-program').value;
  const session=document.getElementById('ns-session')?.value.trim()||'';
  const phone=document.getElementById('ns-phone')?.value.trim()||'';
  const blood=document.getElementById('ns-blood')?.value||'';
  const address=document.getElementById('ns-address')?.value.trim()||'';
  
  if(!roll||!name||!prog){showToast('Fill all required fields','error');return;}
  if(DB.students.find(s=>(s.roll||s.roll_no)===roll)){showToast('Roll number already exists','error');return;}
  
  const checked=[...document.querySelectorAll('#subj-checkboxes input:checked')].map(c=>c.value);
  const defaults=DB.programs[prog]||[];
  const subjectsStr=JSON.stringify(checked)===JSON.stringify(defaults)?'':checked.join(',');
  
  const btn=document.getElementById('add-student-btn');
  btn.innerHTML='<span class="spinner"></span> Saving...';btn.disabled=true;
  
  try{
    let photo_url='';
    const photoInput=document.getElementById('ns-photo');
    if(photoInput&&photoInput.files.length>0){
      const file=photoInput.files[0];
      if(file.size<=100*1024){
        photo_url=await fileToBase64(file);
      }else{
        showToast('Photo size exceeds 100KB limit','error');
        btn.innerHTML='Add Student';btn.disabled=false;
        return;
      }
    }
    
    const student={roll_no:roll,roll:roll,name,program:prog,subjects:subjectsStr,session,phone,blood_group:blood,address,photo_url};
    await sheetsCall({action:'saveStudent',student});
    DB.students.push(student);
    closeModal();showToast(`${name} added successfully`,'success');renderPage('students');
  }catch(e){showToast('Failed to save — check connection','error');btn.innerHTML='Add Student';btn.disabled=false;}
}

// ... (remaining functions remain the same) ...

</script>
</body>
